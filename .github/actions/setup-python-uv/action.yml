name: 'Setup Python via uv'
description: >-
  Install uv (with cache), provision the requested Python version, and sync
  project dependencies. The repository must be checked out by the calling
  workflow before invoking this action.

inputs:
  python-version:
    description: 'Python version passed to `uv python install`.'
    required: false
    default: '3.13'

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python ${{ inputs.python-version }}
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: uv sync
