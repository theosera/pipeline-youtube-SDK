name: 'Setup Python via uv'
description: >-
  Install uv (with cache), provision the requested Python version, and sync
  project dependencies. The repository must be checked out by the calling
  workflow before invoking this action.

inputs:
  python-version:
    description: 'Python version passed to `uv python install`.'
    required: false
    default: '3.13'

runs:
  using: composite
  steps:
    # SHA-pinned to mitigate supply-chain attacks against this third-party
    # action. Bump the SHA and the trailing version comment together;
    # Dependabot will open such PRs (see .github/dependabot.yml).
    # uv binary version is pinned via [tool.uv] required-version in pyproject.toml.
    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
      with:
        enable-cache: true

    - name: Set up Python ${{ inputs.python-version }}
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: uv sync
