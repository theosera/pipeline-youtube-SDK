name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, Mondays 04:30 UTC
    - cron: '30 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

env:
  # See note in main.yml — opt in to Node 24 to silence the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Modern CodeQL Python analysis no longer uses third-party dependencies,
      # so there is no uv/deps install step, CODEQL_PYTHON is unsupported, and
      # the setup-python-dependencies input is deprecated (a no-op) — none are
      # set here.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          category: "/language:python"
