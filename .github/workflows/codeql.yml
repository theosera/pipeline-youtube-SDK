name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, Mondays 04:30 UTC
    - cron: '30 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

env:
  # See note in main.yml — opt in to Node 24 to silence the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      # Modern CodeQL Python analysis no longer uses third-party dependencies,
      # so there is no uv/deps install step, CODEQL_PYTHON is unsupported, and
      # the setup-python-dependencies input is deprecated (a no-op) — none are
      # set here.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1  # v4.37.2
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1  # v4.37.2
        with:
          category: "/language:python"
