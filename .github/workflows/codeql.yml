name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, Mondays 04:30 UTC
    - cron: '30 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

env:
  # See note in main.yml — opt in to Node 24 to silence the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # Modern CodeQL Python analysis no longer uses third-party dependencies,
      # so there is no uv/deps install step (and CODEQL_PYTHON is no longer
      # supported). setup-python-dependencies:false keeps the action from
      # attempting any dependency resolution of its own.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality
          setup-python-dependencies: false

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
