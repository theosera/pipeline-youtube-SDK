name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build & publish (e.g. v0.1.0). Leave blank to build HEAD only (no Release will be created).'
        required: false
        default: ''

# Least privilege at workflow scope; the publish job re-elevates to write.
permissions:
  contents: read

env:
  # See note in main.yml — opt in to Node 24 to silence the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      # SHA-pinned (third-party action). uv version pinned via pyproject.toml.
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build distributions
        run: uv build

      - name: List build outputs
        run: ls -la dist/

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Publish GitHub Release
    needs: build
    # Publish on tag push OR on workflow_dispatch when a v* tag is provided as input.
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      # Pinned to a full commit SHA to prevent tag-retag supply-chain attacks.
      # Update by bumping the SHA and the trailing version comment together.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: dist/*
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
