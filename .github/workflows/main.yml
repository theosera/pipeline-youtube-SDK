name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt into Node.js 24 for JS-based actions ahead of GitHub's 2026-06-02 default
  # flip. Silences the per-run deprecation warning emitted for actions still on
  # Node 20 (e.g. actions/upload-artifact@v4). Remove once those actions ship
  # native Node 24 support and Dependabot has bumped them.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv

      - name: Ruff check
        run: uv run ruff check pipeline_youtube/ tests/

      - name: Ruff format check
        run: uv run ruff format --check pipeline_youtube/ tests/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv

      # mypy options live in [tool.mypy] in pyproject.toml so CI and local runs match.
      - name: mypy
        run: uv run mypy pipeline_youtube/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: uv run --with pytest-cov pytest tests/ -q --tb=short --cov=pipeline_youtube --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
          if-no-files-found: ignore

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv

      # Distinguish vulnerability findings (advisory) from tool failures (real errors):
      #   exit 0  -> clean
      #   exit 1  -> vulnerabilities found; emit a warning annotation, don't fail
      #   other   -> resolver / network / tooling failure; surface as error and fail
      #              so dependency auditing isn't silently disabled.
      - name: pip-audit (advisory)
        run: |
          rc=0
          uv run --with pip-audit pip-audit || rc=$?
          case "$rc" in
            0) ;;
            1) echo "::warning::pip-audit reported findings — see job log." ;;
            *) echo "::error::pip-audit failed to run (exit $rc)"; exit "$rc" ;;
          esac
